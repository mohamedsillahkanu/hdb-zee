<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Happy Birthday Zee · love</title>
  <!-- Google Font for stylish typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    /* reset & base – white background */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    /* mobile app card – white body, black border */
    .app-container {
      max-width: 400px;
      width: 100%;
      background-color: #ffffff;
      border-radius: 36px;
      border: 3px solid #000000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 580px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    /* ----- HEADER : RED theme, 2x height of footer ----- */
    .app-header {
      background-color: #e63946;
      padding: 28px 20px 20px 20px;
      border-bottom: 2px solid #b3002d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      text-align: center;
    }

    .header-title {
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-weight: 700;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
      position: relative;
      display: inline-block;
      padding: 0 4px;
      line-height: 1.2;
      background: none;
      -webkit-text-fill-color: #ffffff;
      background-clip: unset;
    }

    .header-title::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 15%;
      width: 70%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
      border-radius: 4px;
      opacity: 0.6;
    }

    .header-title .sparkle {
      display: inline-block;
      font-family: system-ui, sans-serif;
      font-weight: 300;
      color: #ffd700;
      -webkit-text-fill-color: #ffd700;
      background: none;
      text-shadow: 0 0 8px rgba(255, 215, 0, 0.6);
      margin: 0 2px;
    }

    .header-love {
      display: inline-block;
      font-size: 1.2rem;
      margin: 0 4px;
      color: #ffd700;
      -webkit-text-fill-color: #ffd700;
    }

    /* ----- MAIN BODY : ENLARGED image frame + button ----- */
    .app-body {
      flex: 1;
      background-color: #ffffff;
      padding: 8px 12px 16px 12px; /* reduced vertical padding to give more space to image */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 200px;
    }

    /* IMAGE FRAME - ENLARGED with better fit */
    .image-frame {
      width: 100%;
      background-color: #ffffff;
      border-radius: 24px;
      border: 3px solid #e63946;
      box-shadow: 0 6px 20px rgba(230, 57, 70, 0.15);
      padding: 6px;          /* inner spacing */
      margin-bottom: 14px;
      transition: all 0.2s;
    }

    .fashion-image {
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 5;    /* elegant portrait ratio – fits well */
      max-height: 480px;      /* increased from 400px */
      object-fit: cover;      /* ensures image covers frame without distortion */
      border-radius: 18px;
      display: block;
      background-color: #f5f5f5;
      border: 1px solid rgba(230, 57, 70, 0.1);
    }

    /* "See more" button – red & white */
    .see-more-btn {
      background-color: #e63946;
      color: #ffffff;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      padding: 14px 32px;
      border: none;
      border-radius: 60px;
      box-shadow: 0 4px 12px rgba(230, 57, 70, 0.3);
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      flex-shrink: 0;        /* prevent button from shrinking */
    }

    .see-more-btn:hover {
      background-color: #c1121f;
      transform: scale(1.02);
      box-shadow: 0 6px 16px rgba(230, 57, 70, 0.4);
    }

    .see-more-btn:active {
      transform: scale(0.96);
    }

    .see-more-btn .btn-heart {
      font-size: 1.2rem;
    }

    /* ----- FOOTER : RED theme, half header height ----- */
    .app-footer {
      background-color: #e63946;
      padding: 14px 20px 14px 20px;
      border-top: 2px solid #b3002d;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 40px;
    }

    .footer-text {
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 500;
      font-size: 1.1rem;
      letter-spacing: 0.8px;
      color: #ffffff;
      background: rgba(255, 255, 255, 0.15);
      padding: 4px 28px;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(2px);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .footer-text .love-emoji {
      font-size: 1.2rem;
      line-height: 1;
    }

    /* ----- SLIDESHOW OVERLAY (full screen) ----- */
    .slideshow-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.92);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 20px;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.3s ease;
    }

    .slideshow-overlay.active {
      display: flex;
    }

    .slideshow-container {
      position: relative;
      max-width: 500px;
      width: 100%;
      background-color: #111;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 2px solid #e63946;
    }

    .slideshow-slide {
      display: none;
      width: 100%;
    }

    .slideshow-slide.active {
      display: block;
    }

    .slideshow-slide img {
      width: 100%;
      height: 520px;          /* slightly taller for better viewing */
      object-fit: contain;    /* show whole image, no crop */
      display: block;
      background-color: #0a0a0a;
    }

    /* navigation arrows */
    .slideshow-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(230, 57, 70, 0.7);
      color: white;
      border: none;
      padding: 14px 10px;
      cursor: pointer;
      font-size: 1.8rem;
      border-radius: 0 12px 12px 0;
      transition: background 0.2s;
      z-index: 10;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255,255,255,0.2);
      line-height: 1;
    }

    .slideshow-nav:hover {
      background: rgba(230, 57, 70, 0.9);
    }

    .slideshow-nav.prev {
      left: 0;
      border-radius: 0 12px 12px 0;
      padding-left: 12px;
    }

    .slideshow-nav.next {
      right: 0;
      border-radius: 12px 0 0 12px;
      padding-right: 12px;
    }

    /* close button */
    .slideshow-close {
      position: absolute;
      top: 14px;
      right: 18px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      z-index: 20;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.2);
      transition: background 0.2s;
    }

    .slideshow-close:hover {
      background: #e63946;
    }

    /* dots indicator */
    .slideshow-dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      padding: 6px 14px;
      border-radius: 40px;
      backdrop-filter: blur(2px);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      border: none;
    }

    .dot.active {
      background: #e63946;
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(230, 57, 70, 0.6);
    }

    .dot:hover {
      background: rgba(255,255,255,0.6);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* responsive */
    @media (max-width: 440px) {
      .app-container {
        border-radius: 28px;
      }
      .header-title {
        font-size: 1.5rem;
      }
      .app-header {
        padding: 22px 16px 18px 16px;
        min-height: 70px;
      }
      .app-footer {
        padding: 12px 16px 12px 16px;
        min-height: 36px;
      }
      .footer-text {
        font-size: 1rem;
        padding: 3px 20px;
      }
      .app-body {
        padding: 6px 8px 12px 8px;
      }
      .image-frame {
        padding: 4px;
        border-width: 2px;
      }
      .fashion-image {
        max-height: 400px;
        aspect-ratio: 4 / 5;
        border-radius: 14px;
      }
      .see-more-btn {
        font-size: 1rem;
        padding: 12px 28px;
      }
      .slideshow-slide img {
        height: 420px;
      }
      .slideshow-nav {
        padding: 10px 8px;
        font-size: 1.4rem;
      }
    }

    @media (max-width: 380px) {
      .fashion-image {
        max-height: 340px;
      }
      .slideshow-slide img {
        height: 350px;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-title">
        <span class="sparkle">✦</span>
        <span class="header-love">❤️</span>
        Happy Birthday Zee <br>(Chief Wife)
        <span class="header-love">❤️</span>
        <span class="sparkle">✦</span>
      </div>
    </header>

    <!-- BODY: ENLARGED image frame + "See more" button -->
    <main class="app-body">
      <div class="image-frame">
        <img
          class="fashion-image"
          id="mainImage"
          src=""
          alt="Birthday celebration image"
          loading="lazy"
        >
      </div>

      <button class="see-more-btn" id="seeMoreBtn">
        <span class="btn-heart">❤️</span> See more <span class="btn-heart">❤️</span>
      </button>
    </main>

    <!-- FOOTER -->
    <footer class="app-footer">
      <div class="footer-text">
        <span class="love-emoji">❤️</span>
        HBD Zee @2026
        <span class="love-emoji">❤️</span>
      </div>
    </footer>

  </div>

  <!-- ===== SLIDESHOW OVERLAY ===== -->
  <div class="slideshow-overlay" id="slideshowOverlay">
    <div class="slideshow-container">

      <!-- close button -->
      <button class="slideshow-close" id="closeSlideshow">✕</button>

      <!-- slides wrapper -->
      <div id="slidesWrapper">
        <!-- slides will be injected by JavaScript -->
      </div>

      <!-- navigation -->
      <button class="slideshow-nav prev" id="prevSlide">❮</button>
      <button class="slideshow-nav next" id="nextSlide">❯</button>

      <!-- dots -->
      <div class="slideshow-dots" id="dotsContainer"></div>

    </div>
  </div>

  <script>
    (function() {
      // --------------------------------------------------------------
      // 1. DEFINE THE GITHUB REPO AND FETCH ALL IMAGES
      // --------------------------------------------------------------
      const repoOwner = 'mohamedsillahkanu';
      const repoName = 'hdb-zee';
      const branch = 'main'; // or 'master' – adjust if needed

      // We'll store all image URLs here
      let imageLinks = [];

      // DOM refs
      const mainImage = document.getElementById('mainImage');
      const overlay = document.getElementById('slideshowOverlay');
      const slidesWrapper = document.getElementById('slidesWrapper');
      const dotsContainer = document.getElementById('dotsContainer');
      const prevBtn = document.getElementById('prevSlide');
      const nextBtn = document.getElementById('nextSlide');
      const closeBtn = document.getElementById('closeSlideshow');
      const seeMoreBtn = document.getElementById('seeMoreBtn');

      let currentIndex = 0;
      let totalSlides = 0;

      // --------------------------------------------------------------
      // 2. FETCH IMAGE LIST FROM GITHUB API
      // --------------------------------------------------------------
      async function fetchImagesFromRepo() {
        try {
          const apiUrl = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/`;
          const response = await fetch(apiUrl);
          if (!response.ok) {
            throw new Error(`GitHub API error: ${response.status}`);
          }
          const data = await response.json();

          // Filter for image files (jpg, png, jpeg, gif, webp)
          const imageExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp'];
          const imageFiles = data.filter(file => {
            if (file.type !== 'file') return false;
            const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            return imageExtensions.includes(ext);
          });

          // Build raw URLs
          imageLinks = imageFiles.map(file => {
            return `https://raw.githubusercontent.com/${repoOwner}/${repoName}/${branch}/${file.name}`;
          });

          if (imageLinks.length === 0) {
            // Fallback: use the one known image if API returns none
            imageLinks = [
              'https://raw.githubusercontent.com/mohamedsillahkanu/hdb-zee/main/IMG-20260625-WA0008%20(1).jpg'
            ];
          }

          // Set main image to the first one
          if (imageLinks.length > 0) {
            mainImage.src = imageLinks[0];
            mainImage.alt = 'Birthday celebration image';
          }

          // Build the slideshow
          buildSlideshow();

        } catch (error) {
          console.error('Error fetching images:', error);
          // Fallback: use the known image
          const fallbackImage = 'https://raw.githubusercontent.com/mohamedsillahkanu/hdb-zee/main/IMG-20260625-WA0008%20(1).jpg';
          imageLinks = [fallbackImage];
          mainImage.src = fallbackImage;
          buildSlideshow();
        }
      }

      // --------------------------------------------------------------
      // 3. BUILD SLIDESHOW
      // --------------------------------------------------------------
      function buildSlideshow() {
        slidesWrapper.innerHTML = '';
        dotsContainer.innerHTML = '';
        totalSlides = imageLinks.length;

        if (totalSlides === 0) {
          // fallback
          imageLinks = ['https://raw.githubusercontent.com/mohamedsillahkanu/hdb-zee/main/IMG-20260625-WA0008%20(1).jpg'];
          totalSlides = 1;
        }

        imageLinks.forEach((link, index) => {
          // slide
          const slideDiv = document.createElement('div');
          slideDiv.className = 'slideshow-slide' + (index === 0 ? ' active' : '');
          const img = document.createElement('img');
          img.src = link;
          img.alt = `Slide ${index + 1}`;
          img.loading = 'lazy';
          slideDiv.appendChild(img);
          slidesWrapper.appendChild(slideDiv);

          // dot
          const dot = document.createElement('button');
          dot.className = 'dot' + (index === 0 ? ' active' : '');
          dot.setAttribute('data-index', index);
          dot.addEventListener('click', () => goToSlide(index));
          dotsContainer.appendChild(dot);
        });

        updateSlideshow();
      }

      function updateSlideshow() {
        const slides = slidesWrapper.querySelectorAll('.slideshow-slide');
        const dots = dotsContainer.querySelectorAll('.dot');

        slides.forEach((slide, i) => {
          slide.classList.toggle('active', i === currentIndex);
        });

        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === currentIndex);
        });
      }

      function goToSlide(index) {
        if (index < 0) index = totalSlides - 1;
        if (index >= totalSlides) index = 0;
        currentIndex = index;
        updateSlideshow();
      }

      function nextSlide() {
        goToSlide(currentIndex + 1);
      }

      function prevSlide() {
        goToSlide(currentIndex - 1);
      }

      function openSlideshow() {
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        currentIndex = 0;
        updateSlideshow();
      }

      function closeSlideshow() {
        overlay.classList.remove('active');
        document.body.style.overflow = '';
      }

      // --------------------------------------------------------------
      // 4. EVENT LISTENERS
      // --------------------------------------------------------------
      seeMoreBtn.addEventListener('click', openSlideshow);
      closeBtn.addEventListener('click', closeSlideshow);
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) closeSlideshow();
      });
      prevBtn.addEventListener('click', prevSlide);
      nextBtn.addEventListener('click', nextSlide);

      // Keyboard
      document.addEventListener('keydown', (e) => {
        if (!overlay.classList.contains('active')) return;
        if (e.key === 'ArrowLeft') prevSlide();
        if (e.key === 'ArrowRight') nextSlide();
        if (e.key === 'Escape') closeSlideshow();
      });

      // Touch swipe
      let touchStartX = 0;
      overlay.addEventListener('touchstart', (e) => {
        touchStartX = e.changedTouches[0].screenX;
      }, { passive: true });

      overlay.addEventListener('touchend', (e) => {
        const diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 40) {
          diff > 0 ? nextSlide() : prevSlide();
        }
      }, { passive: true });

      // --------------------------------------------------------------
      // 5. START: Fetch images from repo
      // --------------------------------------------------------------
      fetchImagesFromRepo();

    })();
  </script>

</body>
</html>
